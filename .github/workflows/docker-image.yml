name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build the Docker image
      run: |
        echo "${{ secrets.DOCKERPASSWORD }}" | docker login -u "alobster8912" --password-stdin
        docker build -t cool_docker .
        docker tag cool_docker alobster8912/nice_docker:latest
        docker push alobster8912/nice_docker:latest

